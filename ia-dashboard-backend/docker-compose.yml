version: "3.9"

# Local development stack.
# Starts the FastAPI backend and a PostgreSQL instance together.
# For production use GCP Cloud Run + Supabase (managed Postgres).

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ia_user
      POSTGRES_PASSWORD: ia_password
      POSTGRES_DB: ia_dashboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ia_user -d ia_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    ports:
      - "8000:8080"
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to point at the local Postgres container
      DATABASE_URL: postgresql+asyncpg://ia_user:ia_password@db:5432/ia_dashboard
      APP_ENV: development
      APP_DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount source for hot reload during development
      - ./app:/app/app

volumes:
  postgres_data:
