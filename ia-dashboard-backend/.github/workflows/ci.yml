# .github/workflows/ci.yml
#
# CI pipeline (RNF-12): runs on every push and pull request.
# Tests must pass before deployment is allowed.
#
# Deployment to GCP Cloud Run is triggered only on pushes to main.

name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  GCP_REGION: us-central1
  GCP_SERVICE: ia-dashboard-api

jobs:
  # ------------------------------------------------------------------ #
  # 1. Lint
  # ------------------------------------------------------------------ #
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff==0.4.9

      - name: Run ruff
        run: ruff check app/ tests/

  # ------------------------------------------------------------------ #
  # 2. Test
  # ------------------------------------------------------------------ #
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ia_user
          POSTGRES_PASSWORD: ia_password
          POSTGRES_DB: ia_dashboard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt aiosqlite

      - name: Run tests
        env:
          APP_ENV: test
          APP_DEBUG: "false"
          GEMINI_API_KEY: "dummy-key"
          OPENAI_API_KEY: "dummy-key"
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          SUPABASE_URL: "https://placeholder.supabase.co"
          SUPABASE_ANON_KEY: "placeholder"
          SUPABASE_SERVICE_ROLE_KEY: "placeholder"
          APP_SECRET_KEY: "test-secret-key"
        run: pytest tests/ -v --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
        continue-on-error: true

  # ------------------------------------------------------------------ #
  # 3. Build and deploy to GCP Cloud Run (main branch only)
  # ------------------------------------------------------------------ #
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for GCP Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ia-dashboard/${{ env.GCP_SERVICE }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ia-dashboard/${{ env.GCP_SERVICE }}:${{ github.sha }}"
          gcloud run deploy ${{ env.GCP_SERVICE }} \
            --image "$IMAGE" \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 10 \
            --memory 512Mi \
            --cpu 1 \
            --set-env-vars "APP_ENV=production" \
            --update-secrets \
              GEMINI_API_KEY=gemini-api-key:latest,\
              OPENAI_API_KEY=openai-api-key:latest,\
              DATABASE_URL=database-url:latest,\
              APP_SECRET_KEY=app-secret-key:latest,\
              SUPABASE_URL=supabase-url:latest,\
              SUPABASE_ANON_KEY=supabase-anon-key:latest,\
              SUPABASE_SERVICE_ROLE_KEY=supabase-service-role-key:latest
